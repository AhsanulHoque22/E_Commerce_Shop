# Hot reload while coding: `npm run dev:live` from repo root (starts db+api, stops static `web`, runs Vite on :5173).
# Or: `docker compose up -d db api`, `docker compose stop web`, then `npm run dev --prefix client`.
services:
  db:
    # 8.0 + mysql_native_password: avoids Prisma "Unknown authentication plugin sha256_password"
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: shop
      MYSQL_USER: shop
      MYSQL_PASSWORD: shop
    ports:
      - "3306:3306"
    volumes:
      - shop_mysql_data:/var/lib/mysql
    command:
      - mysqld
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5000:5000"
    # Keep DB schema aligned with prisma/schema.prisma (avoids 500s after schema changes).
    # For destructive changes Prisma may require running db push with --accept-data-loss from the host once.
    command: ["sh", "-c", "npx prisma db push && exec node dist/app.js"]
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: mysql://shop:shop@db:3306/shop
      JWT_ACCESS_SECRET: dev_access_secret_change_me_min_32_chars_xx
      JWT_REFRESH_SECRET: dev_refresh_secret_change_me_min_32_chars_xx
      # Vite dev (npm run dev) and optional alt port; comma-separated for CORS/cookies.
      CLIENT_ORIGIN: "http://localhost:5173,http://localhost:5174"
      # Show OTP in API response when Twilio is not set (local / Docker). Use Twilio in real prod.
      OTP_RETURN_IN_RESPONSE: "true"
    depends_on:
      - db

  web:
    build:
      context: ./client
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: ""
    depends_on:
      - api

volumes:
  shop_mysql_data:
